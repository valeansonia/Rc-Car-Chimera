name: Fast Colcon Build Check

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ROS 2 Humble (minimal)
        run: |
          sudo apt update
          sudo apt install -y software-properties-common curl gnupg lsb-release
          sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
            -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] \
            http://packages.ros.org/ros2/ubuntu $(lsb_release -cs) main" | \
            sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
          sudo apt update
          sudo apt install -y ros-humble-ros-base python3-colcon-common-extensions

      - name: Cache colcon build
        uses: actions/cache@v4
        with:
          path: |
            build/
            install/
            log/
          key: ${{ runner.os }}-colcon-${{ hashFiles('**/package.xml') }}

      - name: Build workspace
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --event-handlers console_cohesion+ --cmake-args -DCMAKE_BUILD_TYPE=Release

      - name: Verify build success
        if: success()
        run: echo "✅ Colcon build completed successfully!"
