name: Fast Colcon Build Check

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ROS 2 Humble (minimal)
        run: |
          pip install vcstool

          locale
          sudo apt update && sudo apt install locales
          sudo locale-gen en_US en_US.UTF-8
          sudo update-locale LC_ALL=en_US.UTF-8 LANG=en_US.UTF-8
          export LANG=en_US.UTF-8
          locale  # verify settings

          sudo apt install software-properties-common curl gnupg lsb-release
          sudo add-apt-repository universe

          sudo apt update && sudo apt install curl -y
          export ROS_APT_SOURCE_VERSION=$(curl -s https://api.github.com/repos/ros-infrastructure/ros-apt-source/releases/latest | grep -F "tag_name" | awk -F\" '{print $4}')
          curl -L -o /tmp/ros2-apt-source.deb "https://github.com/ros-infrastructure/ros-apt-source/releases/download/${ROS_APT_SOURCE_VERSION}/ros2-apt-source_${ROS_APT_SOURCE_VERSION}.$(. /etc/os-release && echo ${UBUNTU_CODENAME:-${VERSION_CODENAME}})_all.deb"
          sudo dpkg -i /tmp/ros2-apt-source.deb

          sudo apt update && sudo apt install -y \
          python3-flake8-docstrings \
          python3-pip \
          python3-pytest-cov \
          ros-dev-tools

          sudo apt install -y \
          python3-flake8-blind-except \
          python3-flake8-builtins \
          python3-flake8-class-newline \
          python3-flake8-comprehensions \
          python3-flake8-deprecated \
          python3-flake8-import-order \
          python3-flake8-quotes \
          python3-pytest-repeat \
          python3-pytest-rerunfailures

          mkdir -p ~/ros2_humble/src
          cd ~/ros2_humble

          vcs import --input https://raw.githubusercontent.com/ros2/ros2/humble/ros2.repos src

          sudo apt upgrade

          sudo rosdep init
          rosdep update
          rosdep install --from-paths src --ignore-src -y --skip-keys "fastcdr rti-connext-dds-6.0.1 urdfdom_headers"

          sudo apt update
          sudo apt install -y ros-humble-desktop

      - name: Build workspace
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          cd ${{ github.workspace }}
          colcon build --event-handlers console_cohesion+ --cmake-args -DCMAKE_BUILD_TYPE=Release

      - name: Verify build success
        if: success()
        run: echo "✅ Colcon build completed successfully!"
